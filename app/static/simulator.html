<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Credit Signal — Payment Simulator</title>
  <style>
    :root { --bg:#0f1419; --panel:#1a2230; --line:#2b3648; --txt:#e6edf3; --muted:#9bafc7;
            --accent:#3b82f6; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--txt);
           font:14px/1.5 system-ui, Segoe UI, Roboto, sans-serif; }
    header { padding:14px 20px; background:var(--panel); border-bottom:1px solid var(--line);
             display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    header h1 { font-size:16px; margin:0 12px 0 0; }
    main { display:grid; grid-template-columns:340px 1fr; gap:16px; padding:16px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
    h2 { font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 10px; }
    input, button, select { font:inherit; }
    input, select { background:#0d1320; border:1px solid var(--line); color:var(--txt);
            border-radius:6px; padding:7px 9px; width:100%; }
    label { display:block; font-size:12px; color:var(--muted); margin:8px 0 3px; }
    button { background:var(--accent); border:0; color:#fff; border-radius:6px;
             padding:8px 12px; cursor:pointer; }
    button.ghost { background:#26344a; }
    button.sm { padding:4px 8px; font-size:12px; }
    button:hover { filter:brightness(1.1); }
    .row { display:flex; gap:8px; align-items:end; flex-wrap:wrap; }
    .row > div { flex:1; min-width:90px; }
    .buyer { padding:10px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; cursor:pointer; }
    .buyer:hover { border-color:var(--accent); }
    .buyer.active { border-color:var(--accent); background:#0d1320; }
    .pill { display:inline-block; font-size:11px; padding:1px 7px; border-radius:99px; }
    .pill.paid{background:rgba(34,197,94,.15);color:var(--good)} .pill.pending{background:rgba(245,158,11,.15);color:var(--warn)}
    .pill.bounced{background:rgba(239,68,68,.15);color:var(--bad)} .pill.overdue{background:rgba(239,68,68,.2);color:var(--bad)}
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:600; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; }
    .stat { background:#0d1320; border:1px solid var(--line); border-radius:8px; padding:10px; }
    .stat .v { font-size:20px; font-weight:700; } .stat .k { color:var(--muted); font-size:12px; }
    .muted { color:var(--muted); } .err { color:var(--bad); } .ok { color:var(--good); }
    #toast { position:fixed; right:16px; bottom:16px; background:var(--panel); border:1px solid var(--line);
             padding:10px 14px; border-radius:8px; opacity:0; transition:opacity .2s; max-width:360px; }
    #toast.show { opacity:1; }
  </style>
</head>
<body>
  <header>
    <h1>💳 Payment Simulator</h1>
    <div style="flex:1; min-width:260px;">
      <input id="apiKey" placeholder="Paste your X-API-Key (csr_…)" />
    </div>
    <button class="ghost" onclick="saveKey()">Save key</button>
    <button class="ghost" onclick="seedSample()">Load sample data</button>
    <button class="ghost" onclick="loadBuyers()">Refresh</button>
  </header>

  <main>
    <section>
      <div class="panel">
        <h2>Add buyer</h2>
        <label>Name</label><input id="bName" placeholder="Acme Retail" />
        <label>GSTIN (optional)</label><input id="bGstin" placeholder="27AAPFU0939F1ZV" />
        <div style="margin-top:10px;"><button onclick="addBuyer()">Add buyer</button></div>
      </div>

      <div class="panel" style="margin-top:14px;">
        <h2>Import CSV</h2>
        <p class="muted" style="font-size:12px;margin:0 0 8px;">
          Columns: buyer_name, buyer_gstin, invoice_number, amount, order_date, due_date, paid_date, status, bounce_count
        </p>
        <input type="file" id="csvFile" accept=".csv" />
        <div style="margin-top:10px;"><button onclick="uploadCsv()">Upload CSV</button></div>
      </div>

      <div class="panel" style="margin-top:14px;">
        <h2>Buyers</h2>
        <div id="buyers"><p class="muted">Save your key, then add or load buyers.</p></div>
      </div>
    </section>

    <section class="panel">
      <div id="detail"><p class="muted">Select a buyer to see orders &amp; payment behaviour.</p></div>
    </section>
  </main>

  <div id="toast"></div>

  <script>
    const base = window.location.origin;
    let activeBuyer = null;

    function key() { return document.getElementById('apiKey').value.trim(); }
    function saveKey() { localStorage.setItem('csrKey', key()); toast('Key saved.'); loadBuyers(); }
    function toast(msg, bad=false) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'show'; t.style.borderColor = bad ? 'var(--bad)' : 'var(--line)';
      setTimeout(() => t.className = '', 2600);
    }
    async function api(path, opts={}) {
      const headers = Object.assign({'X-API-Key': key()}, opts.headers || {});
      if (opts.json !== undefined) { headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(opts.json); }
      const res = await fetch(base + path, {method: opts.method || 'GET', headers, body: opts.body});
      const text = await res.text();
      const data = text ? JSON.parse(text) : null;
      if (!res.ok) throw new Error((data && data.detail) ? JSON.stringify(data.detail) : res.status);
      return data;
    }
    const money = n => '₹' + Number(n).toLocaleString('en-IN');
    const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    async function loadBuyers() {
      if (!key()) return;
      try {
        const buyers = await api('/buyers?limit=200');
        const el = document.getElementById('buyers');
        if (!buyers.length) { el.innerHTML = '<p class="muted">No buyers yet.</p>'; return; }
        el.innerHTML = buyers.map(b => `
          <div class="buyer ${activeBuyer===b.id?'active':''}" onclick="openBuyer('${b.id}')">
            <strong>${esc(b.name)}</strong><br>
            <span class="muted">${esc(b.gstin) || 'no GSTIN'}</span>
          </div>`).join('');
      } catch (e) { toast('Load failed: ' + e.message, true); }
    }

    async function addBuyer() {
      const name = document.getElementById('bName').value.trim();
      const gstin = document.getElementById('bGstin').value.trim() || null;
      if (!name) return toast('Enter a name.', true);
      try {
        await api('/buyers', {method:'POST', json:{name, gstin}});
        document.getElementById('bName').value=''; document.getElementById('bGstin').value='';
        toast('Buyer added.'); loadBuyers();
      } catch (e) { toast('Error: ' + e.message, true); }
    }

    async function seedSample() {
      if (!key()) return toast('Save your key first.', true);
      try { const r = await api('/payment-history/seed-sample', {method:'POST'});
        toast(`Seeded ${r.buyers_created} buyers, ${r.orders_created} orders.`); loadBuyers();
      } catch (e) { toast('Error: ' + e.message, true); }
    }

    async function uploadCsv() {
      const f = document.getElementById('csvFile').files[0];
      if (!f) return toast('Choose a CSV file.', true);
      const fd = new FormData(); fd.append('file', f);
      try {
        const res = await fetch(base + '/payment-history/import-csv', {method:'POST', headers:{'X-API-Key':key()}, body:fd});
        const r = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(r.detail));
        toast(`Imported ${r.orders_created} orders, ${r.buyers_created} new buyers${r.errors.length?', '+r.errors.length+' errors':''}.`);
        loadBuyers();
      } catch (e) { toast('Import failed: ' + e.message, true); }
    }

    async function openBuyer(id) {
      activeBuyer = id; loadBuyers();
      try {
        const [orders, sum] = await Promise.all([
          api('/buyers/'+id+'/orders'), api('/buyers/'+id+'/payment-summary')]);
        renderDetail(id, orders, sum);
      } catch (e) { toast('Error: ' + e.message, true); }
    }

    function renderDetail(id, orders, s) {
      const today = new Date().toISOString().slice(0,10);
      const rows = orders.map(o => {
        const overdue = o.status==='pending' && o.due_date < today;
        const st = overdue ? 'overdue' : o.status;
        return `<tr>
          <td>${esc(o.invoice_number)||'—'}</td>
          <td>${money(o.amount)}</td>
          <td>${o.due_date}</td>
          <td>${o.paid_date||'—'}</td>
          <td><span class="pill ${st}">${st}</span>${o.bounce_count?` <span class="muted">×${o.bounce_count} bounce</span>`:''}</td>
          <td style="white-space:nowrap">
            <button class="sm ghost" onclick="payOrder('${o.id}')">Mark paid</button>
            <button class="sm ghost" onclick="bounceOrder('${o.id}')">Bounce</button>
          </td></tr>`;
      }).join('');

      document.getElementById('detail').innerHTML = `
        <h2>Payment behaviour</h2>
        <div class="grid">
          <div class="stat"><div class="v">${s.total_orders}</div><div class="k">orders</div></div>
          <div class="stat"><div class="v">${s.on_time_rate==null?'—':Math.round(s.on_time_rate*100)+'%'}</div><div class="k">on-time rate</div></div>
          <div class="stat"><div class="v">${s.avg_delay_days==null?'—':s.avg_delay_days+'d'}</div><div class="k">avg delay</div></div>
          <div class="stat"><div class="v">${s.overdue_orders}</div><div class="k">overdue</div></div>
          <div class="stat"><div class="v">${s.total_bounces}</div><div class="k">bounces</div></div>
          <div class="stat"><div class="v">${money(s.outstanding_amount)}</div><div class="k">outstanding</div></div>
        </div>

        <h2 style="margin-top:18px;">Add order</h2>
        <div class="row">
          <div><label>Amount</label><input id="oAmt" type="number" value="50000" /></div>
          <div><label>Order date</label><input id="oOrder" type="date" value="${today}" /></div>
          <div><label>Due date</label><input id="oDue" type="date" value="${today}" /></div>
          <div><label>Invoice #</label><input id="oInv" placeholder="INV-001" /></div>
          <div style="flex:0"><button onclick="addOrder('${id}')">Add</button></div>
        </div>

        <h2 style="margin-top:18px;">Orders</h2>
        <table><thead><tr><th>Invoice</th><th>Amount</th><th>Due</th><th>Paid</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows || '<tr><td colspan="6" class="muted">No orders yet.</td></tr>'}</tbody></table>`;
    }

    async function addOrder(id) {
      const body = {
        amount: document.getElementById('oAmt').value || '0',
        order_date: document.getElementById('oOrder').value,
        due_date: document.getElementById('oDue').value,
        invoice_number: document.getElementById('oInv').value.trim() || null,
      };
      try { await api('/buyers/'+id+'/orders', {method:'POST', json:body}); toast('Order added.'); openBuyer(id); }
      catch (e) { toast('Error: ' + e.message, true); }
    }
    async function payOrder(oid) {
      const d = prompt('Paid date (YYYY-MM-DD):', new Date().toISOString().slice(0,10));
      if (!d) return;
      try { await api('/orders/'+oid+'/pay', {method:'POST', json:{paid_date:d}}); toast('Marked paid.'); openBuyer(activeBuyer); }
      catch (e) { toast('Error: ' + e.message, true); }
    }
    async function bounceOrder(oid) {
      try { await api('/orders/'+oid+'/bounce', {method:'POST'}); toast('Bounce flagged.'); openBuyer(activeBuyer); }
      catch (e) { toast('Error: ' + e.message, true); }
    }

    // init
    document.getElementById('apiKey').value = localStorage.getItem('csrKey') || '';
    loadBuyers();
  </script>
</body>
</html>
